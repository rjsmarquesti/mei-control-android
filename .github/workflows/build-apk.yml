name: Build Android

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      profile:
        description: 'Build profile'
        required: true
        default: 'apk'
        type: choice
        options:
          - apk
          - aab

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build Android (${{ github.event.inputs.profile || 'apk' }})
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4.7.1
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3.2.2

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Expo CLI
        run: npm install -g @expo/cli@latest

      - name: Create .env with secrets
        run: echo "EXPO_PUBLIC_ACTIVATION_SALT=${{ secrets.ACTIVATION_SALT }}" > .env

      - name: Generate native Android project
        run: npx expo prebuild --platform android --clean
        env:
          EXPO_PUBLIC_ACTIVATION_SALT: ${{ secrets.ACTIVATION_SALT }}

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Restore keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode --ignore-garbage > android/app/mei-control.jks

      - name: Build APK (distribuição direta)
        if: ${{ github.event.inputs.profile != 'aab' }}
        run: |
          cd android
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/android/app/mei-control.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}
        env:
          EXPO_PUBLIC_ACTIVATION_SALT: ${{ secrets.ACTIVATION_SALT }}
          GRADLE_OPTS: -Xmx4096m -XX:MaxMetaspaceSize=512m

      - name: Build AAB (Play Store)
        if: ${{ github.event.inputs.profile == 'aab' }}
        run: |
          cd android
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/android/app/mei-control.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}
        env:
          EXPO_PUBLIC_ACTIVATION_SALT: ${{ secrets.ACTIVATION_SALT }}
          GRADLE_OPTS: -Xmx4096m -XX:MaxMetaspaceSize=512m

      - name: Upload APK
        if: ${{ github.event.inputs.profile != 'aab' }}
        uses: actions/upload-artifact@v4.6.2
        with:
          name: mei-control-pro-${{ github.ref_name }}.apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      - name: Upload AAB
        if: ${{ github.event.inputs.profile == 'aab' }}
        uses: actions/upload-artifact@v4.6.2
        with:
          name: mei-control-pro-${{ github.ref_name }}.aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30
